# test-pods.yaml
apiVersion: v1
kind: Pod
metadata:
  name: api-pod
  namespace: saas-practice
  labels:
    app: api
spec:
  containers:
    - name: api
      image: nginx
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "100m"
          memory: "128Mi"
---
apiVersion: v1
kind: Pod
metadata:
  name: client-pod
  namespace: saas-practice
  labels:
    app: client
spec:
  containers:
    - name: client
      image: busybox
      command: ["sleep", "3600"]
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "100m"
          memory: "128Mi"