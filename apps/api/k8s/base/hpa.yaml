apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler 
metadata:
  name: api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1 
    kind: Deployment 
    name: api-service # must match my Deployment name 
  minReplicas: 2
  maxReplicas: 5 
  metrics:
    - type: Resource 
      resource:
        name: cpu 
        target: 
          type: Utilization
          averageUtilization: 50 # scale up when avg CPU > 50% of REQUEST