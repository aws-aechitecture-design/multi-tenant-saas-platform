apiVersion: apps/v1
kind: Deployment 
metadata:
  name: api-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api 
  template:
    metadata:
      labels:
        app: api 
    spec:
      containers:
        - name: api-service 
          image: api-service:1.0.0
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          resources: 
            requests:
              cpu: "100m" # 0.1 core guaranted
              memory: "128Mi" # 128MB guaranted
            limits:
              cpu: "200m" # 0.2 core max
              memory: "256Mi" # 256MB max - exceed this = OOMKilled
          env:
            - name: APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: api-config
                  key: APP_ENV
            - name: APP_MESSAGE
              valueFrom: 
                configMapKeyRef:
                  name: api-config
                  key: APP_MESSAGE
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: DB_PASSWORD
          volumeMounts:
            - name: api-data 
              mountPath: /data 
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          
      volumes: 
        - name: api-data 
          #emptyDir: {}
          persistentVolumeClaim:
            claimName: api-pvc-storage-class