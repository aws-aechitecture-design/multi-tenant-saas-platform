apiVersion: v1
kind: LimitRange 
metadata:
  name: saas-limitrange
  namespace: saas-practice # scoped to our namespace
spec:
  limits:
    - type: Container 
      default: 
        cpu: "200m" 
        memory: "256Mi" 
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      max: 
        cpu: "500m"
        memory: "512Mi"