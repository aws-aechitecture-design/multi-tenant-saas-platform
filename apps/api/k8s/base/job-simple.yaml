apiVersion: batch/v1
kind: Job 
metadata:
  name: simple-job
  namespace: saas-practice
spec:
  template:
    spec:
      containers:
        - name: simple-job
          image: busybox 
          command: ["sh","-c","echo Hello from Job! && sleep 5 && echo Job Done!"]
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
      restartPolicy: Never # <- Jobs must have Never or OnFailure , never Always